<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>react-canvas-snow — Interactive Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }

    .toggle-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(20,20,30,0.7);
      backdrop-filter: blur(12px);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.2s;
    }
    .toggle-btn:hover { background: rgba(40,40,60,0.85); }

    .panel {
      position: fixed;
      top: 16px;
      right: 64px;
      z-index: 90;
      width: 300px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      padding: 20px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(15,15,25,0.75);
      backdrop-filter: blur(16px);
    }
    .panel h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .preset-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-btn:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }

    fieldset {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    legend {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      padding: 0 6px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 8px 0;
    }
    .control-label {
      font-size: 13px;
      white-space: nowrap;
      min-width: 70px;
    }
    .control-value {
      font-variant-numeric: tabular-nums;
      color: #8ab4f8;
      font-size: 12px;
      margin-left: 4px;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #8ab4f8;
      cursor: pointer;
      border: none;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #8ab4f8;
      cursor: pointer;
      border: none;
    }

    input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: none;
      cursor: pointer;
      padding: 2px;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
